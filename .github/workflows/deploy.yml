name: Build & Deploy Quartz Site

on:
  schedule:
    - cron: '0 3 * * *'  # Nightly at 03:00 UTC
  workflow_dispatch:
  push:

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Quartz repo
        uses: actions/checkout@v4

      - name: Clone vault repo
        run: |
          git clone https://$GITHUB_ACTOR:${{ secrets.VAULT_TOKEN }}@github.com/ville-solja/Obsidian-BJJ.git temp-vault
          rm -rf content/*
          cp -r temp-vault/* content/

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          check-latest: true
          cache: 'npm'

      - name: Manually enforce Node 22 path and check versions
        run: |
          export PATH="/opt/hostedtoolcache/node/22*/x64/bin:$PATH"
          hash -r
          echo "Using Node from: $(which node)"
          node -v
          echo "Using npm from: $(which npm)"
          npm -v

      - name: Install dependencies
        run: |
          export PATH="/opt/hostedtoolcache/node/22*/x64/bin:$PATH"
          npm install

      - name: Build Quartz site
        run: |
          export PATH="/opt/hostedtoolcache/node/22*/x64/bin:$PATH"
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.VAULT_TOKEN }}
          publish_dir: ./public
