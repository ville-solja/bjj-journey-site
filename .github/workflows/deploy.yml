name: Build & Deploy Quartz Site

on:
  schedule:
    - cron: '0 3 * * *'  # Nightly at 03:00 UTC
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Quartz repo
        uses: actions/checkout@v4

      - name: Clone vault repo and sync to content/
        run: |
          git clone https://$GITHUB_ACTOR:${{ secrets.VAULT_TOKEN }}@github.com/ville-solja/Obsidian-BJJ.git temp-vault
          rm -rf content/*
          rsync -av --exclude=package.json --exclude=package-lock.json temp-vault/ content/

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          check-latest: true
          cache: 'npm'

      - name: Clean npm cache (optional but safe)
        run: npm cache clean --force

      - name: Install dependencies
        run: npm install

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Recently Updated Notes
        run: python3 generate_pages.py

      - name: Generate vault statistics
        run: python3 generate_wordcount.py

      - name: Build Quartz site
        run: npm run build

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Quartz repo
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
