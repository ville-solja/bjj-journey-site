name: Build & Deploy Quartz Site

on:
  schedule:
    - cron: '0 3 * * *'  # Nightly at 03:00 UTC
  workflow_dispatch:
  push:

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Quartz repo
        uses: actions/checkout@v4

      - name: Clone vault repo
        run: |
          git clone https://$GITHUB_ACTOR:${{ secrets.VAULT_TOKEN }}@github.com/ville-solja/Obsidian-BJJ.git temp-vault
          rm -rf content/*
          cp -r temp-vault/* content/

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          check-latest: true
          cache: 'npm'

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Verify Node and npm versions
        run: |
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"
          echo "Which Node: $(which node)"
          echo "Which npm: $(which npm)"

      - name: List available npm scripts
        working-directory: .
        run: npm run

      - name: Debug – Show current working directory and files
        run: |
          echo "PWD: $(pwd)"
          ls -la
          cat package.json || echo "package.json not found"

      - name: Install dependencies
        working-directory: .
        run: npm install

      - name: Build Quartz site
        working-directory: .
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.VAULT_TOKEN }}
          publish_dir: ./public
